<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before vs After - Informatica to dbt Migration</title>
<style>
  body { margin: 0; padding: 40px; background: #f8f9fa; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .diagram-container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { text-align: center; color: #1a1a2e; font-size: 22px; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 30px; }
</style>
</head>
<body>
<div class="diagram-container">
  <h1>Before vs After - Architecture Comparison</h1>
  <p class="subtitle">Legacy Informatica PowerCenter vs Modern dbt on Snowflake</p>

  <svg width="1020" height="720" viewBox="0 0 1020 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
      </filter>
      <marker id="ar1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#DC2626"/>
      </marker>
      <marker id="ar2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#16A34A"/>
      </marker>
    </defs>

    <!-- BEFORE Section -->
    <rect x="20" y="20" width="480" height="680" rx="14" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
    <rect x="20" y="20" width="480" height="45" rx="14" fill="#DC2626"/>
    <rect x="20" y="45" width="480" height="20" fill="#DC2626"/>
    <text x="260" y="52" text-anchor="middle" font-size="16" font-weight="700" fill="white">BEFORE: Informatica PowerCenter</text>

    <!-- Source servers -->
    <rect x="50" y="90" width="200" height="55" rx="8" fill="white" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="150" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">Oracle EBS (On-Premise)</text>
    <text x="150" y="131" text-anchor="middle" font-size="9" fill="#666">JDE Tables, SAP XML</text>

    <rect x="270" y="90" width="200" height="55" rx="8" fill="white" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="370" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">File Server (On-Premise)</text>
    <text x="370" y="131" text-anchor="middle" font-size="9" fill="#666">CSV, Flat Files</text>

    <!-- Informatica Server -->
    <rect x="100" y="175" width="320" height="160" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
    <text x="260" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">Informatica PowerCenter Server</text>
    <text x="260" y="218" text-anchor="middle" font-size="10" fill="#B91C1C">(On-Premise / Licensed)</text>

    <rect x="120" y="235" width="130" height="40" rx="5" fill="white" stroke="#DC2626" stroke-width="1"/>
    <text x="185" y="252" text-anchor="middle" font-size="9" font-weight="600" fill="#991B1B">9 Mappings</text>
    <text x="185" y="266" text-anchor="middle" font-size="8" fill="#666">Complex workflows</text>

    <rect x="268" y="235" width="130" height="40" rx="5" fill="white" stroke="#DC2626" stroke-width="1"/>
    <text x="333" y="252" text-anchor="middle" font-size="9" font-weight="600" fill="#991B1B">32 Lookups</text>
    <text x="333" y="266" text-anchor="middle" font-size="8" fill="#666">Lookup transforms</text>

    <rect x="120" y="285" width="280" height="35" rx="5" fill="#DC2626" opacity="0.1"/>
    <text x="260" y="307" text-anchor="middle" font-size="9" fill="#991B1B">ETL: Extract → Transform → Load (server-side)</text>

    <!-- Target -->
    <rect x="100" y="365" width="320" height="55" rx="8" fill="white" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="260" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="#991B1B">Target Database</text>
    <text x="260" y="406" text-anchor="middle" font-size="9" fill="#666">Tables loaded by Informatica sessions</text>

    <!-- Arrows BEFORE -->
    <line x1="150" y1="145" x2="220" y2="172" stroke="#DC2626" stroke-width="1.5" marker-end="url(#ar1)"/>
    <line x1="370" y1="145" x2="300" y2="172" stroke="#DC2626" stroke-width="1.5" marker-end="url(#ar1)"/>
    <line x1="260" y1="335" x2="260" y2="362" stroke="#DC2626" stroke-width="1.5" marker-end="url(#ar1)"/>

    <!-- Pain points -->
    <rect x="50" y="445" width="430" height="240" rx="8" fill="white" stroke="#FCA5A5" stroke-width="1"/>
    <text x="265" y="472" text-anchor="middle" font-size="12" font-weight="700" fill="#991B1B">Pain Points</text>

    <circle cx="80" cy="502" r="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="80" y="506" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="700">1</text>
    <text x="100" y="506" font-size="10" fill="#555">Expensive licensing costs</text>

    <circle cx="80" cy="532" r="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="80" y="536" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="700">2</text>
    <text x="100" y="536" font-size="10" fill="#555">On-premise server maintenance</text>

    <circle cx="80" cy="562" r="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="80" y="566" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="700">3</text>
    <text x="100" y="566" font-size="10" fill="#555">No version control (GUI-based)</text>

    <circle cx="80" cy="592" r="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="80" y="596" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="700">4</text>
    <text x="100" y="596" font-size="10" fill="#555">No built-in testing framework</text>

    <circle cx="80" cy="622" r="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="80" y="626" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="700">5</text>
    <text x="100" y="626" font-size="10" fill="#555">Limited lineage visibility</text>

    <circle cx="80" cy="652" r="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="80" y="656" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="700">6</text>
    <text x="100" y="656" font-size="10" fill="#555">No incremental processing support</text>

    <!-- AFTER Section -->
    <rect x="520" y="20" width="480" height="680" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
    <rect x="520" y="20" width="480" height="45" rx="14" fill="#16A34A"/>
    <rect x="520" y="45" width="480" height="20" fill="#16A34A"/>
    <text x="760" y="52" text-anchor="middle" font-size="16" font-weight="700" fill="white">AFTER: dbt + Snowflake (Cloud-Native)</text>

    <!-- Sources on Snowflake -->
    <rect x="550" y="90" width="420" height="55" rx="8" fill="white" stroke="#16A34A" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="760" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Sources: MOCK_SOURCES Schema (38 tables)</text>
    <text x="760" y="131" text-anchor="middle" font-size="9" fill="#666">Oracle EBS + Flat Files loaded into Snowflake</text>

    <!-- dbt Project -->
    <rect x="550" y="175" width="420" height="230" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" filter="url(#shadow)"/>
    <text x="760" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">dbt Native Project on Snowflake</text>
    <text x="760" y="218" text-anchor="middle" font-size="10" fill="#15803D">(Serverless, No Infrastructure)</text>

    <rect x="570" y="230" width="120" height="50" rx="6" fill="white" stroke="#16A34A" stroke-width="1"/>
    <text x="630" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Staging</text>
    <text x="630" y="268" text-anchor="middle" font-size="9" fill="#666">26 views</text>

    <rect x="700" y="230" width="120" height="50" rx="6" fill="white" stroke="#16A34A" stroke-width="1"/>
    <text x="760" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Intermediate</text>
    <text x="760" y="268" text-anchor="middle" font-size="9" fill="#666">17 views</text>

    <rect x="830" y="230" width="120" height="50" rx="6" fill="white" stroke="#16A34A" stroke-width="1"/>
    <text x="890" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Marts</text>
    <text x="890" y="268" text-anchor="middle" font-size="9" fill="#666">8 fact/dim</text>

    <rect x="570" y="295" width="125" height="40" rx="5" fill="#16A34A" opacity="0.1"/>
    <text x="633" y="315" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">170 Tests</text>
    <text x="633" y="329" text-anchor="middle" font-size="8" fill="#15803D">Auto-validated</text>

    <rect x="705" y="295" width="125" height="40" rx="5" fill="#16A34A" opacity="0.1"/>
    <text x="768" y="315" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">2 Macros</text>
    <text x="768" y="329" text-anchor="middle" font-size="8" fill="#15803D">MD5 hashing</text>

    <rect x="840" y="295" width="125" height="40" rx="5" fill="#16A34A" opacity="0.1"/>
    <text x="903" y="315" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">32 Variables</text>
    <text x="903" y="329" text-anchor="middle" font-size="8" fill="#15803D">Lookup → var()</text>

    <rect x="570" y="350" width="395" height="40" rx="5" fill="#16A34A" opacity="0.15"/>
    <text x="760" y="375" text-anchor="middle" font-size="10" fill="#166534" font-weight="600">ELT: Extract + Load → Transform in Snowflake (push-down)</text>

    <!-- Output -->
    <rect x="550" y="430" width="420" height="55" rx="8" fill="white" stroke="#16A34A" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="760" y="453" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Output: DBT_INGEST Schema (51 objects)</text>
    <text x="760" y="471" text-anchor="middle" font-size="9" fill="#666">44 views + 3 tables + 4 incremental = 51 total (51/51 PASS)</text>

    <!-- Arrows AFTER -->
    <line x1="760" y1="145" x2="760" y2="172" stroke="#16A34A" stroke-width="1.5" marker-end="url(#ar2)"/>
    <line x1="760" y1="405" x2="760" y2="427" stroke="#16A34A" stroke-width="1.5" marker-end="url(#ar2)"/>

    <!-- Benefits -->
    <rect x="550" y="510" width="430" height="175" rx="8" fill="white" stroke="#86EFAC" stroke-width="1"/>
    <text x="765" y="537" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Benefits Achieved</text>

    <circle cx="580" cy="562" r="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="580" y="566" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="700">&#10003;</text>
    <text x="600" y="566" font-size="10" fill="#555">Zero licensing cost (Snowflake-native)</text>

    <circle cx="580" cy="592" r="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="580" y="596" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="700">&#10003;</text>
    <text x="600" y="596" font-size="10" fill="#555">Fully serverless, no infrastructure</text>

    <circle cx="580" cy="622" r="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="580" y="626" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="700">&#10003;</text>
    <text x="600" y="626" font-size="10" fill="#555">Git-based version control &amp; code review</text>

    <circle cx="580" cy="652" r="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="580" y="656" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="700">&#10003;</text>
    <text x="600" y="656" font-size="10" fill="#555">170 automated tests with every run</text>

    <circle cx="580" cy="682" r="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="580" y="686" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="700">&#10003;</text>
    <text x="600" y="686" font-size="10" fill="#555">Full DAG lineage + incremental processing</text>

    <!-- VS divider -->
    <circle cx="510" cy="360" r="22" fill="#1E293B" filter="url(#shadow)"/>
    <text x="510" y="366" text-anchor="middle" font-size="13" font-weight="700" fill="white">VS</text>
  </svg>
</div>
</body>
</html>
