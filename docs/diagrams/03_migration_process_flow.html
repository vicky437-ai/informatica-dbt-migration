<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migration Process Flow - Informatica to dbt</title>
<style>
  body { margin: 0; padding: 40px; background: #f8f9fa; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .diagram-container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { text-align: center; color: #1a1a2e; font-size: 22px; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 30px; }
</style>
</head>
<body>
<div class="diagram-container">
  <h1>Migration Process Flow - End-to-End Conversion Methodology</h1>
  <p class="subtitle">From Informatica PowerCenter XML to Snowflake-native dbt Project</p>

  <svg width="1020" height="820" viewBox="0 0 1020 820" xmlns="http://www.w3.org/2000/svg">

      <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">

        <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
      </marker>
      <marker id="arrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
      </marker>
    </defs>

    <!-- Phase 1 -->
    <rect x="20" y="20" width="980" height="140" rx="12" fill="#FEF3C7" opacity="0.5" stroke="#F59E0B" stroke-width="1"/>
    <text x="50" y="50" font-size="14" font-weight="700" fill="#92400E">PHASE 1: Assessment &amp; Extraction</text>

    <rect x="40" y="65" width="180" height="80" rx="10" fill="#FCD34D" filter="url(#shadow)"/>
    <text x="130" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#78350F">Export Informatica</text>
    <text x="130" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#78350F">Mappings (XML)</text>
    <text x="130" y="130" text-anchor="middle" font-size="10" fill="#92400E">9 PowerCenter maps</text>

    <rect x="260" y="65" width="180" height="80" rx="10" fill="#FCD34D" filter="url(#shadow)"/>

    <text x="350" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#78350F">Mappings</text>

    <rect x="480" y="65" width="180" height="80" rx="10" fill="#FCD34D" filter="url(#shadow)"/>
    <text x="570" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#78350F">Create Source</text>
    <text x="570" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#78350F">Table Map</text>
    <text x="570" y="130" text-anchor="middle" font-size="10" fill="#92400E">source_map.json</text>

    <rect x="700" y="65" width="180" height="80" rx="10" fill="#FCD34D" filter="url(#shadow)"/>
    <text x="790" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#78350F">Mock Source</text>
    <text x="790" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#78350F">Tables in Snowflake</text>
    <text x="790" y="130" text-anchor="middle" font-size="10" fill="#92400E">35+ tables in MOCK_SOURCES</text>

    <line x1="220" y1="105" x2="257" y2="105" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>
    <line x1="440" y1="105" x2="477" y2="105" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>
    <line x1="660" y1="105" x2="697" y2="105" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>

    <text x="50" y="210" font-size="14" font-weight="700" fill="#1E3A5F">PHASE 2: Automated Conversion (Python + AI)</text>

    <rect x="40" y="225" width="180" height="80" rx="10" fill="#60A5FA" filter="url(#shadow)"/>
    <text x="130" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="white">Parse XML</text>
    <text x="130" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="white">Mappings</text>
    <text x="130" y="290" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Extract transformations</text>

    <rect x="260" y="225" width="180" height="80" rx="10" fill="#60A5FA" filter="url(#shadow)"/>
    <text x="350" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="white">Generate dbt</text>
    <text x="350" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="white">Models (SQL)</text>
    <text x="350" y="290" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">stg → int → marts</text>

    <rect x="480" y="225" width="180" height="80" rx="10" fill="#60A5FA" filter="url(#shadow)"/>
    <text x="570" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="white">Generate Schema</text>
    <text x="570" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="white">Tests (YAML)</text>
    <text x="570" y="290" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">170 data tests</text>

    <rect x="700" y="225" width="180" height="80" rx="10" fill="#60A5FA" filter="url(#shadow)"/>
    <text x="790" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="white">Convert Lookups</text>
    <text x="790" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="white">to dbt var()</text>
    <text x="790" y="290" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">32 lookup transforms</text>

    <line x1="220" y1="265" x2="257" y2="265" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>
    <line x1="440" y1="265" x2="477" y2="265" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>
    <line x1="660" y1="265" x2="697" y2="265" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>

    <!-- Phase 3 -->
    <rect x="20" y="340" width="980" height="140" rx="12" fill="#E0E7FF" opacity="0.5" stroke="#6366F1" stroke-width="1"/>
    <text x="50" y="370" font-size="14" font-weight="700" fill="#3730A3">PHASE 3: Local Validation &amp; Testing</text>

    <rect x="40" y="385" width="180" height="80" rx="10" fill="#818CF8" filter="url(#shadow)"/>

    <rect x="260" y="385" width="180" height="80" rx="10" fill="#818CF8" filter="url(#shadow)"/>
    <text x="350" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="white">dbt run</text>
    <text x="350" y="430" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Execute 51 models</text>
    <text x="350" y="448" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Create views &amp; tables</text>

    <rect x="480" y="385" width="180" height="80" rx="10" fill="#818CF8" filter="url(#shadow)"/>
    <text x="570" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="white">dbt test</text>
    <text x="570" y="430" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Run 170 tests</text>
    <text x="570" y="448" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">not_null, unique, etc.</text>

    <rect x="700" y="385" width="180" height="80" rx="10" fill="#818CF8" filter="url(#shadow)"/>
    <text x="790" y="412" text-anchor="middle" font-size="12" font-weight="600" fill="white">Fix &amp; Iterate</text>
    <text x="790" y="430" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Resolve test failures</text>
    <text x="790" y="448" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Refine logic</text>

    <line x1="220" y1="425" x2="257" y2="425" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>
    <line x1="440" y1="425" x2="477" y2="425" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>
    <line x1="660" y1="425" x2="697" y2="425" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>

    <!-- Phase 4 -->
    <rect x="20" y="500" width="980" height="150" rx="12" fill="#D1FAE5" opacity="0.5" stroke="#10B981" stroke-width="1"/>
    <text x="50" y="530" font-size="14" font-weight="700" fill="#065F46">PHASE 4: Snowflake-Native Deployment</text>

    <rect x="40" y="545" width="200" height="90" rx="10" fill="#34D399" filter="url(#shadow)"/>
    <text x="140" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="white">Prepare profiles.yml</text>
    <text x="140" y="592" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">No password (Snowflake auth)</text>
    <text x="140" y="610" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Fix YAML compatibility</text>
    <text x="140" y="624" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Deduplicate sources</text>

    <rect x="280" y="545" width="200" height="90" rx="10" fill="#34D399" filter="url(#shadow)"/>
    <text x="380" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="white">snow dbt deploy</text>
    <text x="380" y="592" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Upload 1545 files</text>
    <text x="380" y="610" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Create native project</text>
    <text x="380" y="624" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">VERSION$1</text>

    <rect x="520" y="545" width="200" height="90" rx="10" fill="#34D399" filter="url(#shadow)"/>
    <text x="620" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="white">snow dbt execute</text>
    <text x="620" y="592" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Compile from Snowflake</text>
    <text x="620" y="610" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Run from Snowflake</text>
    <text x="620" y="624" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">51/51 PASS</text>

    <rect x="760" y="545" width="220" height="90" rx="10" fill="#34D399" filter="url(#shadow)"/>
    <text x="870" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="white">Verify in Snowsight</text>
    <text x="870" y="592" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">View DAG in UI</text>
    <text x="870" y="610" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Run/Test from browser</text>
    <text x="870" y="624" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Schedule with Tasks</text>

    <line x1="240" y1="590" x2="277" y2="590" stroke="#065F46" stroke-width="2" marker-end="url(#arrG)"/>
    <line x1="480" y1="590" x2="517" y2="590" stroke="#065F46" stroke-width="2" marker-end="url(#arrG)"/>
    <line x1="720" y1="590" x2="757" y2="590" stroke="#065F46" stroke-width="2" marker-end="url(#arrG)"/>

    <line x1="510" y1="158" x2="510" y2="177" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>
    <line x1="510" y1="318" x2="510" y2="337" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>
    <line x1="510" y1="478" x2="510" y2="497" stroke="#64748B" stroke-width="2" marker-end="url(#arrD)"/>

    <!-- Results banner -->
    <rect x="20" y="670" width="980" height="130" rx="12" fill="#1E293B" filter="url(#shadow)"/>
    <text x="510" y="702" text-anchor="middle" font-size="16" font-weight="700" fill="white">Migration Results</text>

    <rect x="50" y="720" width="170" height="60" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="135" y="745" text-anchor="middle" font-size="24" font-weight="700" fill="#FCD34D">9</text>
    <text x="135" y="768" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">Informatica Mappings</text>

    <rect x="240" y="720" width="170" height="60" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="325" y="745" text-anchor="middle" font-size="24" font-weight="700" fill="#60A5FA">51</text>
    <text x="325" y="768" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">dbt Models Created</text>

    <rect x="430" y="720" width="170" height="60" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="515" y="745" text-anchor="middle" font-size="24" font-weight="700" fill="#818CF8">170</text>
    <text x="515" y="768" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">Data Tests</text>

    <rect x="620" y="720" width="170" height="60" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="705" y="745" text-anchor="middle" font-size="24" font-weight="700" fill="#34D399">100%</text>
