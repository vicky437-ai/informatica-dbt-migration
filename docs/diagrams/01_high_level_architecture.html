<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High-Level Architecture - Informatica to dbt Migration</title>
<style>
  body { margin: 0; padding: 40px; background: #f8f9fa; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .diagram-container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { text-align: center; color: #1a1a2e; font-size: 24px; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 40px; }
  svg { display: block; margin: 0 auto; }
  .legend { display: flex; justify-content: center; gap: 32px; margin-top: 30px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; }
  .legend-dot { width: 14px; height: 14px; border-radius: 4px; }
</style>
</head>
<body>
<div class="diagram-container">
  <h1>Informatica to dbt/Snowflake Migration - High-Level Architecture</h1>
  <p class="subtitle">End-to-End Data Pipeline: From Legacy ETL to Modern ELT on Snowflake</p>

  <svg width="1100" height="720" viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
        <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
      </filter>
      <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#29B5E8"/>
      </marker>
      <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#21BA72"/>
      </marker>
      <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
      </marker>
      <linearGradient id="gradSource" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#EE5A24;stop-opacity:1"/>
      </linearGradient>
      <linearGradient id="gradConvert" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#A29BFE;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:1"/>
      </linearGradient>
      <linearGradient id="gradDbt" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#FF9F43;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1"/>
      </linearGradient>
      <linearGradient id="gradSnowflake" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#29B5E8;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#0D8ABC;stop-opacity:1"/>
      </linearGradient>
      <linearGradient id="gradOutput" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#21BA72;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#10AC63;stop-opacity:1"/>
      </linearGradient>
    </defs>

    <!-- Background sections -->
    <rect x="20" y="60" width="200" height="600" rx="12" fill="#FFF5F5" stroke="#FFE0E0" stroke-width="1"/>
    <text x="120" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#CC4444">SOURCE SYSTEMS</text>

    <rect x="260" y="60" width="180" height="600" rx="12" fill="#F5F3FF" stroke="#E0DCFF" stroke-width="1"/>
    <text x="350" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#6C5CE7">CONVERSION ENGINE</text>

    <rect x="480" y="60" width="220" height="600" rx="12" fill="#FFF8F0" stroke="#FFE8CC" stroke-width="1"/>
    <text x="590" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#CC8800">dbt PROJECT</text>

    <rect x="740" y="60" width="170" height="600" rx="12" fill="#F0F8FF" stroke="#CCE8FF" stroke-width="1"/>
    <text x="825" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#0D8ABC">SNOWFLAKE</text>

    <rect x="950" y="60" width="130" height="600" rx="12" fill="#F0FFF5" stroke="#CCFFdd" stroke-width="1"/>
    <text x="1015" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#10AC63">OUTPUTS</text>

    <!-- Source: Oracle -->
    <rect x="40" y="130" width="160" height="80" rx="10" fill="url(#gradSource)" filter="url(#shadow)"/>
    <text x="120" y="162" text-anchor="middle" font-size="14" font-weight="600" fill="white">Oracle EBS</text>
    <text x="120" y="182" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">JD Edwards Tables</text>
    <text x="120" y="198" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">F0911, F0901, F0011...</text>

    <!-- Source: Flat Files -->
    <rect x="40" y="240" width="160" height="80" rx="10" fill="url(#gradSource)" filter="url(#shadow)"/>
    <text x="120" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="white">Flat Files</text>
    <text x="120" y="292" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">CSV / Delimited</text>
    <text x="120" y="308" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">Journals, GL Accounts</text>

    <!-- Source: SAP -->
    <rect x="40" y="350" width="160" height="80" rx="10" fill="url(#gradSource)" filter="url(#shadow)"/>
    <text x="120" y="382" text-anchor="middle" font-size="14" font-weight="600" fill="white">SAP / XML</text>
    <text x="120" y="402" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">Material Master</text>
    <text x="120" y="418" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">Product Attributes</text>

    <!-- Source: Informatica -->
    <rect x="40" y="480" width="160" height="110" rx="10" fill="#FF6B6B" opacity="0.15" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="120" y="510" text-anchor="middle" font-size="13" font-weight="600" fill="#CC3333">Informatica</text>
    <text x="120" y="528" text-anchor="middle" font-size="13" font-weight="600" fill="#CC3333">PowerCenter</text>
    <text x="120" y="550" text-anchor="middle" font-size="10" fill="#CC3333">9 Mappings</text>
    <text x="120" y="568" text-anchor="middle" font-size="10" fill="#CC3333">32 Lookup Transforms</text>
    <text x="120" y="582" text-anchor="middle" font-size="9" fill="#AA3333" font-style="italic">DECOMMISSIONED</text>

    <!-- Conversion Engine -->
    <rect x="278" y="200" width="145" height="130" rx="10" fill="url(#gradConvert)" filter="url(#shadow)"/>
    <text x="350" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="white">Informatica</text>
    <text x="350" y="253" text-anchor="middle" font-size="13" font-weight="700" fill="white">to dbt</text>
    <text x="350" y="273" text-anchor="middle" font-size="13" font-weight="700" fill="white">Converter</text>
    <text x="350" y="298" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Python + AI-Assisted</text>
    <text x="350" y="316" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Auto-generates dbt code</text>

    <rect x="278" y="370" width="145" height="90" rx="10" fill="url(#gradConvert)" filter="url(#shadow)" opacity="0.85"/>
    <text x="350" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="white">Mapping Analysis</text>
    <text x="350" y="420" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Source → Target</text>
    <text x="350" y="438" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Transformation Logic</text>
    <text x="350" y="452" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Lookup Resolution</text>

    <!-- dbt Project Layer -->
    <rect x="498" y="120" width="185" height="65" rx="8" fill="url(#gradDbt)" filter="url(#shadow)"/>
    <text x="590" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="white">Staging Layer</text>
    <text x="590" y="168" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">26 models (views)</text>

    <rect x="498" y="210" width="185" height="65" rx="8" fill="url(#gradDbt)" filter="url(#shadow)"/>
    <text x="590" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="white">Intermediate Layer</text>
    <text x="590" y="258" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">17 models (views)</text>

    <rect x="498" y="300" width="185" height="65" rx="8" fill="url(#gradDbt)" filter="url(#shadow)"/>
    <text x="590" y="328" text-anchor="middle" font-size="13" font-weight="600" fill="white">Marts Layer</text>
    <text x="590" y="348" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">8 models (fact/dim)</text>

    <rect x="498" y="395" width="185" height="50" rx="8" fill="#F59E0B" opacity="0.2" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="590" y="417" text-anchor="middle" font-size="12" font-weight="600" fill="#B87600">170 Data Tests</text>
    <text x="590" y="435" text-anchor="middle" font-size="10" fill="#B87600">Schema + Custom</text>

    <rect x="498" y="470" width="185" height="50" rx="8" fill="#F59E0B" opacity="0.2" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="590" y="492" text-anchor="middle" font-size="12" font-weight="600" fill="#B87600">2 Custom Macros</text>
    <text x="590" y="510" text-anchor="middle" font-size="10" fill="#B87600">MD5 Hash Generation</text>

    <rect x="498" y="545" width="185" height="55" rx="8" fill="#F59E0B" opacity="0.2" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="590" y="567" text-anchor="middle" font-size="12" font-weight="600" fill="#B87600">32 Lookup Variables</text>
    <text x="590" y="585" text-anchor="middle" font-size="10" fill="#B87600">Informatica LKP → dbt var()</text>

    <!-- Snowflake -->
    <rect x="757" y="120" width="135" height="80" rx="8" fill="url(#gradSnowflake)" filter="url(#shadow)"/>
    <text x="825" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="white">MOCK_SOURCES</text>
    <text x="825" y="168" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">38 Source Tables</text>
    <text x="825" y="184" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Oracle + Flat File</text>

    <rect x="757" y="230" width="135" height="80" rx="8" fill="url(#gradSnowflake)" filter="url(#shadow)"/>
    <text x="825" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="white">DBT_INGEST</text>
    <text x="825" y="276" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">44 Views</text>
    <text x="825" y="292" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">3 Tables + 4 Incremental</text>

    <rect x="757" y="340" width="135" height="80" rx="8" fill="url(#gradSnowflake)" filter="url(#shadow)"/>
    <text x="825" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="white">Native dbt</text>
    <text x="825" y="383" text-anchor="middle" font-size="12" font-weight="600" fill="white">Project</text>
    <text x="825" y="403" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">VERSION$1 Deployed</text>

    <rect x="757" y="450" width="135" height="70" rx="8" fill="url(#gradSnowflake)" filter="url(#shadow)" opacity="0.85"/>
    <text x="825" y="478" text-anchor="middle" font-size="12" font-weight="600" fill="white">SMALL_WH</text>
    <text x="825" y="498" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Compute Warehouse</text>
    <text x="825" y="512" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Auto-Suspend 60s</text>

    <!-- Output -->
    <rect x="962" y="140" width="105" height="70" rx="8" fill="url(#gradOutput)" filter="url(#shadow)"/>
    <text x="1015" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="white">Snowsight</text>
    <text x="1015" y="188" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">DAG Viewer</text>
    <text x="1015" y="202" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">UI Controls</text>

    <rect x="962" y="240" width="105" height="70" rx="8" fill="url(#gradOutput)" filter="url(#shadow)"/>
    <text x="1015" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="white">SQL API</text>
    <text x="1015" y="286" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">EXECUTE DBT</text>
    <text x="1015" y="300" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">PROJECT</text>

    <rect x="962" y="340" width="105" height="70" rx="8" fill="url(#gradOutput)" filter="url(#shadow)"/>
    <text x="1015" y="368" text-anchor="middle" font-size="12" font-weight="600" fill="white">Lineage</text>
    <text x="1015" y="386" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Data Lineage</text>
    <text x="1015" y="400" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Tracking</text>

    <rect x="962" y="440" width="105" height="70" rx="8" fill="url(#gradOutput)" filter="url(#shadow)"/>
    <text x="1015" y="468" text-anchor="middle" font-size="12" font-weight="600" fill="white">Scheduling</text>
    <text x="1015" y="486" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Snowflake Tasks</text>
    <text x="1015" y="500" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Cron-based</text>

    <!-- Arrows: Source → Conversion -->
    <line x1="200" y1="170" x2="275" y2="240" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowBlue)" opacity="0.6"/>
    <line x1="200" y1="280" x2="275" y2="270" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowBlue)" opacity="0.6"/>
    <line x1="200" y1="390" x2="275" y2="300" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowBlue)" opacity="0.6"/>

    <!-- Arrows: Conversion → dbt -->
    <line x1="423" y1="240" x2="495" y2="155" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
    <line x1="423" y1="270" x2="495" y2="240" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
    <line x1="423" y1="300" x2="495" y2="330" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

    <!-- Arrows: dbt layers -->
    <line x1="590" y1="185" x2="590" y2="207" stroke="#CC8800" stroke-width="1.5" marker-end="url(#arrowOrange)" opacity="0.5"/>
    <line x1="590" y1="275" x2="590" y2="297" stroke="#CC8800" stroke-width="1.5" marker-end="url(#arrowOrange)" opacity="0.5"/>

    <!-- Arrows: dbt → Snowflake -->
    <line x1="683" y1="152" x2="754" y2="160" stroke="#29B5E8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <line x1="683" y1="242" x2="754" y2="260" stroke="#29B5E8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <line x1="683" y1="332" x2="754" y2="370" stroke="#29B5E8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

    <!-- Arrows: Snowflake → Output -->
    <line x1="892" y1="380" x2="959" y2="175" stroke="#21BA72" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.6"/>
    <line x1="892" y1="380" x2="959" y2="275" stroke="#21BA72" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.6"/>
    <line x1="892" y1="380" x2="959" y2="375" stroke="#21BA72" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.6"/>
    <line x1="892" y1="380" x2="959" y2="475" stroke="#21BA72" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.6"/>

    <!-- Database label -->
    <text x="825" y="560" text-anchor="middle" font-size="11" font-weight="600" fill="#0D8ABC">TPC_DI_RAW_DATA</text>
    <text x="825" y="578" text-anchor="middle" font-size="10" fill="#0D8ABC" opacity="0.7">Account: EPCKZEL-SQUADRON</text>

    <!-- Migration badge -->
    <rect x="60" y="620" width="160" height="30" rx="15" fill="#FF6B6B" opacity="0.15" stroke="#FF6B6B" stroke-width="1"/>
    <text x="140" y="640" text-anchor="middle" font-size="11" font-weight="600" fill="#CC3333">LEGACY (Retired)</text>

    <rect x="500" y="620" width="180" height="30" rx="15" fill="#21BA72" opacity="0.15" stroke="#21BA72" stroke-width="1"/>
    <text x="590" y="640" text-anchor="middle" font-size="11" font-weight="600" fill="#10AC63">MODERN (Active)</text>
  </svg>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background: #EE5A24;"></div>Source Systems (Oracle, Flat Files, SAP)</div>
    <div class="legend-item"><div class="legend-dot" style="background: #6C5CE7;"></div>Conversion Engine (Python + AI)</div>
    <div class="legend-item"><div class="legend-dot" style="background: #F59E0B;"></div>dbt Project (Models, Tests, Macros)</div>
    <div class="legend-item"><div class="legend-dot" style="background: #29B5E8;"></div>Snowflake Platform</div>
    <div class="legend-item"><div class="legend-dot" style="background: #21BA72;"></div>Outputs (UI, API, Lineage)</div>
  </div>
</div>
</body>
</html>
