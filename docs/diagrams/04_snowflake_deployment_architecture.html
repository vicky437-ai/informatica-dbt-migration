<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowflake Deployment Architecture</title>
<style>
  body { margin: 0; padding: 40px; background: #f8f9fa; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .diagram-container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { text-align: center; color: #1a1a2e; font-size: 22px; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 30px; }
</style>
</head>
<body>
<div class="diagram-container">
  <h1>Snowflake Platform Deployment Architecture</h1>
  <p class="subtitle">Native dbt Project Object within Snowflake ecosystem - TPC_DI_RAW_DATA.DBT_INGEST</p>

  <svg width="1020" height="700" viewBox="0 0 1020 700" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
      </filter>
      <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#29B5E8"/>
      </marker>
      <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
      </marker>
    </defs>

    <!-- Snowflake Account boundary -->
    <rect x="20" y="20" width="980" height="660" rx="16" fill="#F0F8FF" stroke="#29B5E8" stroke-width="2"/>
    <text x="510" y="52" text-anchor="middle" font-size="15" font-weight="700" fill="#0D8ABC">SNOWFLAKE ACCOUNT: EPCKZEL-SQUADRON_US_EAST_1</text>
    <text x="510" y="70" text-anchor="middle" font-size="11" fill="#0D8ABC" opacity="0.7">Role: ACCOUNTADMIN | User: BABU | Warehouse: SMALL_WH</text>

    <!-- Database box -->
    <rect x="50" y="90" width="920" height="565" rx="12" fill="white" stroke="#29B5E8" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="510" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1E3A5F">Database: TPC_DI_RAW_DATA</text>

    <!-- Schema: MOCK_SOURCES -->
    <rect x="80" y="135" width="400" height="230" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="280" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">Schema: MOCK_SOURCES</text>
    <text x="280" y="180" text-anchor="middle" font-size="10" fill="#92400E" opacity="0.7">Source tables from legacy systems</text>

    <rect x="100" y="195" width="170" height="28" rx="5" fill="white" stroke="#E67E22" stroke-width="1"/>
    <text x="185" y="214" text-anchor="middle" font-size="10" fill="#8B4513">f0911 (Account Ledger)</text>
    <rect x="100" y="228" width="170" height="28" rx="5" fill="white" stroke="#E67E22" stroke-width="1"/>
    <text x="185" y="247" text-anchor="middle" font-size="10" fill="#8B4513">f0901 (Account Master)</text>
    <rect x="100" y="261" width="170" height="28" rx="5" fill="white" stroke="#E67E22" stroke-width="1"/>
    <text x="185" y="280" text-anchor="middle" font-size="10" fill="#8B4513">f0011 (Batch Control)</text>
    <rect x="100" y="294" width="170" height="28" rx="5" fill="white" stroke="#E67E22" stroke-width="1"/>
    <text x="185" y="313" text-anchor="middle" font-size="10" fill="#8B4513">f0092, f01151, s_zj_...</text>

    <rect x="290" y="195" width="175" height="28" rx="5" fill="white" stroke="#E67E22" stroke-width="1"/>
    <text x="378" y="214" text-anchor="middle" font-size="10" fill="#8B4513">t_ap_citibank_vca</text>
    <rect x="290" y="228" width="175" height="28" rx="5" fill="white" stroke="#E67E22" stroke-width="1"/>
    <text x="378" y="247" text-anchor="middle" font-size="10" fill="#8B4513">t_cm_z1_sales</text>
    <rect x="290" y="261" width="175" height="28" rx="5" fill="white" stroke="#E67E22" stroke-width="1"/>
    <text x="378" y="280" text-anchor="middle" font-size="10" fill="#8B4513">ff_bl_zj_journals_src</text>
    <rect x="290" y="294" width="175" height="28" rx="5" fill="white" stroke="#E67E22" stroke-width="1"/>
    <text x="378" y="313" text-anchor="middle" font-size="10" fill="#8B4513">+ 27 more tables</text>

    <rect x="100" y="330" width="365" height="22" rx="4" fill="#F59E0B" opacity="0.15"/>
    <text x="280" y="346" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">Total: 38 source tables (Oracle EBS + Flat Files)</text>

    <!-- Schema: DBT_INGEST -->
    <rect x="520" y="135" width="430" height="500" rx="10" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="735" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">Schema: DBT_INGEST</text>
    <text x="735" y="180" text-anchor="middle" font-size="10" fill="#065F46" opacity="0.7">dbt-generated objects + Native Project</text>

    <!-- Views section -->
    <rect x="540" y="195" width="190" height="150" rx="8" fill="white" stroke="#3B82F6" stroke-width="1"/>
    <text x="635" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Views (44)</text>
    <text x="555" y="237" font-size="9" fill="#555">stg_f0911_jnl_stg</text>
    <text x="555" y="252" font-size="9" fill="#555">stg_am_di_customer</text>
    <text x="555" y="267" font-size="9" fill="#555">stg_citibank_vca</text>
    <text x="555" y="282" font-size="9" fill="#555">int_journals_base</text>
    <text x="555" y="297" font-size="9" fill="#555">int_equipment_lookups</text>
    <text x="555" y="312" font-size="9" fill="#555">int_material_with_flags</text>
    <text x="555" y="327" font-size="9" fill="#555">...and 38 more views</text>

    <!-- Tables section -->
    <rect x="748" y="195" width="190" height="85" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1"/>
    <text x="843" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#6D28D9">Tables (3)</text>
    <text x="760" y="237" font-size="9" fill="#555">fct_zj_journals_flat_file</text>
    <text x="760" y="252" font-size="9" fill="#555">fct_ff_journals_output</text>
    <text x="760" y="267" font-size="9" fill="#555">fct_ff_journals_with_filename</text>

    <!-- Incremental section -->
    <rect x="748" y="295" width="190" height="100" rx="8" fill="white" stroke="#EC4899" stroke-width="1"/>
    <text x="843" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#BE185D">Incremental (4)</text>
    <text x="760" y="337" font-size="9" fill="#555">fct_zj_journals_staging</text>
    <text x="760" y="352" font-size="9" fill="#555">fct_zj_journals_output</text>
    <text x="760" y="367" font-size="9" fill="#555">dim_equipment_soft_delete</text>
    <text x="760" y="382" font-size="9" fill="#555">dim_mtrl_master</text>

    <!-- Native dbt Project -->
    <rect x="540" y="405" width="398" height="110" rx="10" fill="#0D8ABC" filter="url(#shadow)"/>
    <text x="739" y="432" text-anchor="middle" font-size="13" font-weight="700" fill="white">Native dbt Project Object</text>
    <text x="739" y="452" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">INFORMATICA_TO_DBT (VERSION$1)</text>

    <rect x="560" y="465" width="170" height="38" rx="5" fill="rgba(255,255,255,0.15)"/>
    <text x="645" y="481" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">dbt-core: 1.9.4</text>
    <text x="645" y="496" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">snowflake adapter: 1.9.2</text>

    <rect x="748" y="465" width="170" height="38" rx="5" fill="rgba(255,255,255,0.15)"/>
    <text x="833" y="481" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">51 models, 170 tests</text>
    <text x="833" y="496" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">38 sources, 592 macros</text>

    <!-- Execution methods -->
    <rect x="540" y="530" width="190" height="90" rx="8" fill="white" stroke="#0D8ABC" stroke-width="1.5"/>
    <text x="635" y="552" text-anchor="middle" font-size="11" font-weight="600" fill="#0D8ABC">CLI Execution</text>
    <text x="555" y="572" font-size="9" fill="#555">snow dbt execute ... compile</text>
    <text x="555" y="587" font-size="9" fill="#555">snow dbt execute ... run</text>
    <text x="555" y="602" font-size="9" fill="#555">snow dbt execute ... test</text>

    <rect x="748" y="530" width="190" height="90" rx="8" fill="white" stroke="#0D8ABC" stroke-width="1.5"/>
    <text x="843" y="552" text-anchor="middle" font-size="11" font-weight="600" fill="#0D8ABC">SQL Execution</text>
    <text x="760" y="572" font-size="9" fill="#555">EXECUTE DBT PROJECT</text>
    <text x="760" y="587" font-size="9" fill="#555">  ...ARGS='run'</text>
    <text x="760" y="602" font-size="9" fill="#555">  ...ARGS='test'</text>

    <!-- Arrow from sources to ingest -->
    <line x1="480" y1="250" x2="517" y2="250" stroke="#29B5E8" stroke-width="2.5" marker-end="url(#a1)"/>
    <text x="498" y="242" text-anchor="middle" font-size="9" fill="#29B5E8" transform="rotate(-90, 498, 242)">source()</text>

    <!-- Warehouse -->
    <rect x="80" y="400" width="400" height="90" rx="10" fill="#E0E7FF" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="280" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#3730A3">Warehouse: SMALL_WH</text>
    <text x="280" y="452" text-anchor="middle" font-size="11" fill="#4338CA">Size: Small | Auto-Suspend: 60s</text>
    <text x="280" y="470" text-anchor="middle" font-size="10" fill="#6366F1" opacity="0.7">Executes all dbt model SQL against Snowflake compute</text>

    <line x1="480" y1="445" x2="517" y2="445" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a2)"/>

    <!-- Snowsight -->
    <rect x="80" y="520" width="400" height="120" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="280" y="548" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">Snowsight Web UI</text>

    <rect x="100" y="560" width="115" height="60" rx="6" fill="white" stroke="#EF4444" stroke-width="1"/>
    <text x="158" y="582" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">DAG Viewer</text>
    <text x="158" y="598" text-anchor="middle" font-size="9" fill="#555">Dependency graph</text>

    <rect x="228" y="560" width="115" height="60" rx="6" fill="white" stroke="#EF4444" stroke-width="1"/>
    <text x="286" y="582" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">Run Controls</text>
    <text x="286" y="598" text-anchor="middle" font-size="9" fill="#555">Compile / Run / Test</text>

    <rect x="356" y="560" width="115" height="60" rx="6" fill="white" stroke="#EF4444" stroke-width="1"/>
    <text x="414" y="582" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">Run History</text>
    <text x="414" y="598" text-anchor="middle" font-size="9" fill="#555">Logs &amp; Status</text>

  </svg>
</div>
</body>
</html>
